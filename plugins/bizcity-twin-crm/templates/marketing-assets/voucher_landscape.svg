<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="{{BRAND_PRIMARY}}"/>
      <stop offset="100%" stop-color="{{BRAND_SECONDARY}}"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="548" rx="24" ry="24" fill="#ffffff" fill-opacity="0.96"/>
  <image href="{{BRAND_LOGO}}" x="80" y="80" width="120" height="120" preserveAspectRatio="xMidYMid meet"/>
  <text x="220" y="130" font-family="sans-serif" font-size="28" font-weight="600" fill="{{BRAND_PRIMARY}}">{{BRAND_NAME}}</text>
  <text x="220" y="170" font-family="sans-serif" font-size="16" fill="#64748b">{{HOTLINE}}</text>
  <text x="80" y="280" font-family="sans-serif" font-size="56" font-weight="800" fill="#0f172a">{{HEADLINE}}</text>
  <text x="80" y="350" font-family="sans-serif" font-size="22" fill="#475569">{{CTA_TEXT}}</text>
  <rect x="80" y="400" width="420" height="80" rx="12" ry="12" fill="{{BRAND_PRIMARY}}"/>
  <text x="290" y="452" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#ffffff">{{VOUCHER_CODE}}</text>
  <image href="{{QR_IMG}}" x="860" y="220" width="260" height="260" preserveAspectRatio="xMidYMid meet"/>
  <text x="990" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">Quét QR để nhận ưu đãi</text>
</svg>
