<?xml version="1.0" encoding="UTF-8"?>
<!-- PHASE 0.35 M6.W18 — story_vertical (1080×1920 — IG/FB/TikTok story) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="{{BRAND_PRIMARY}}"/>
      <stop offset="100%" stop-color="{{BRAND_SECONDARY}}"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <image href="{{BRAND_LOGO}}" x="450" y="120" width="180" height="180" preserveAspectRatio="xMidYMid meet"/>
  <text x="540" y="360" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="600" fill="#ffffff">{{BRAND_NAME}}</text>
  <text x="540" y="600" text-anchor="middle" font-family="sans-serif" font-size="80" font-weight="800" fill="#ffffff">{{HEADLINE}}</text>
  <text x="540" y="700" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#ffffff" fill-opacity="0.9">{{CTA_TEXT}}</text>
  <rect x="290" y="800" width="500" height="500" rx="24" ry="24" fill="#ffffff"/>
  <image href="{{QR_IMG}}" x="320" y="830" width="440" height="440" preserveAspectRatio="xMidYMid meet"/>
  <rect x="290" y="1380" width="500" height="120" rx="20" ry="20" fill="#ffffff"/>
  <text x="540" y="1456" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="{{BRAND_PRIMARY}}">{{VOUCHER_CODE}}</text>
  <text x="540" y="1620" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#ffffff">Vuốt lên · Quét QR</text>
  <text x="540" y="1820" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.8">{{HOTLINE}}</text>
</svg>
